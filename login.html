<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Login · SIM SPPG</title>

    <link rel="icon" type="image/png" href="./assets/favicon.png" />

    <link rel="stylesheet" href="./css/login.css" />
  </head>

  <body>
    <div class="login-background"></div>

    <div class="login-card">
      <div class="login-logo">
        <img src="./assets/favicon.png" alt="SPPG Logo" />
      </div>

      <h1>Sistem Informasi Manajemen SPPG</h1>

      <span class="login-label"> Masuk sebagai </span>

      <div class="account-options" role="group" aria-label="Pilih akun">
        <button
          type="button"
          class="account-option selected"
          data-username="admin"
        >
          Administrator
        </button>

        <button type="button" class="account-option" data-username="guest">
          Guest
        </button>
      </div>

      <div id="pinSection">
        <label class="login-label" for="pinInput"> PIN </label>

        <div class="pin-wrapper">
          <input
            type="password"
            id="pinInput"
            inputmode="numeric"
            autocomplete="off"
            autofocus
          />

          <div class="pin-dots">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
        </div>
      </div>

      <small id="errorText"></small>
    </div>

    <script
      defer
      src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"
    ></script>

    <script defer src="supabase.js"></script>

    <script defer src="js/login.js"></script>
  </body>
</html>
